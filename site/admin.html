<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 백오피스 — PICA HUB</title>
<style>
:root{--bg:#0b0d12;--panel:#151923;--panel2:#1d2330;--line:#2a3141;--text:#eef2f8;--muted:#8d98aa;--accent:#ff8c00;--blue:#4f8cff;--green:#28c878;--red:#f05252}
*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
header{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--line);background:#10141c;position:sticky;top:0;z-index:2}
.brand{font-weight:900}.brand span{color:var(--accent)}.wrap{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 58px)}
nav{border-right:1px solid var(--line);padding:16px;background:#10141c}.tab{width:100%;text-align:left;background:transparent;color:var(--muted);border:1px solid transparent;border-radius:8px;padding:11px 12px;margin-bottom:6px;cursor:pointer;font-weight:700}.tab.active,.tab:hover{color:var(--text);background:var(--panel);border-color:var(--line)}
main{padding:22px}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:16px}.title{font-size:22px;font-weight:900}.hint{font-size:12px;color:var(--muted);margin-top:4px}
button{font-family:inherit}.btn{border:0;border-radius:8px;padding:10px 14px;cursor:pointer;font-weight:800}.btn.primary{background:var(--accent);color:#111}.btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.btn.danger{background:rgba(240,82,82,.12);color:#ff8b8b;border:1px solid rgba(240,82,82,.3)}
.login{max-width:380px;margin:90px auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:24px}.login h1{margin:0 0 6px;font-size:24px}.login p{margin:0 0 18px;color:var(--muted);font-size:13px}
label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin:10px 0 6px}input,select,textarea{width:100%;background:#0d1118;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:9px 10px;font:inherit;font-size:13px}textarea{min-height:90px;resize:vertical}
.grid{display:grid;gap:10px}.row{display:grid;grid-template-columns:repeat(6,minmax(90px,1fr)) 84px;gap:8px;align-items:end;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px}.row.notice{grid-template-columns:120px 1fr 90px 110px 84px}.row.simple{grid-template-columns:1fr 160px 130px 84px}.row.community{grid-template-columns:130px 1fr 130px 90px 84px}
.msg{font-size:13px;color:var(--muted)}.ok{color:var(--green)}.err{color:var(--red)}@media(max-width:900px){.wrap{grid-template-columns:1fr}nav{display:flex;overflow:auto;border-right:0;border-bottom:1px solid var(--line)}.tab{white-space:nowrap}.row,.row.notice,.row.simple,.row.community{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="brand">PICA<span>HUB</span> Back Office</div><button class="btn ghost" onclick="location.href='index.html'">사이트 보기</button></header>
<section id="login" class="login">
  <h1>관리자 로그인</h1>
  <p>기본 계정은 admin / admin1234 입니다.</p>
  <label>아이디</label><input id="adminId" value="admin">
  <label>비밀번호</label><input id="adminPw" type="password" value="admin1234">
  <button class="btn primary" style="width:100%;margin-top:16px" onclick="login()">로그인</button>
  <div id="loginMsg" class="msg" style="margin-top:12px"></div>
</section>
<section id="app" class="wrap" style="display:none">
  <nav id="tabs"></nav>
  <main>
    <div class="toolbar">
      <div><div class="title" id="sectionTitle"></div><div class="hint">저장하면 서버의 <code>site/data/content.json</code>에 반영됩니다.</div></div>
      <div><button class="btn ghost" onclick="addRow()">항목 추가</button> <button class="btn primary" onclick="save()">저장</button></div>
    </div>
    <div id="editor" class="grid"></div>
    <div id="msg" class="msg" style="margin-top:14px"></div>
  </main>
</section>
<script src="assets/api.js"></script>
<script>
const sections = {
  rankings:{title:'게임순위', cls:'', fields:[['rank','순위','number'],['name','게임명'],['publisher','퍼블리셔'],['genre','장르'],['share','점유율','number'],['change','변동','select',['same','up','down']]], blank:{rank:1,name:'',publisher:'',genre:'',share:0,change:'same',icon:''}},
  notices:{title:'공지사항', cls:'notice', fields:[['category','분류'],['title','제목'],['date','날짜'],['tone','톤','select',['ai','gt','food','sys','comm']]], blank:{category:'공지',title:'',date:'04.30',tone:'sys'}},
  programs:{title:'프로그램/다운로드', cls:'simple', fields:[['name','프로그램명'],['version','버전'],['status','상태'],['updatedAt','수정일','date']], blank:{name:'',version:'1.0.0',status:'정상',updatedAt:'2026-04-30'}},
  community:{title:'커뮤니티', cls:'community', fields:[['board','게시판'],['title','제목'],['author','작성자'],['date','날짜']], blank:{board:'공지',title:'',author:'운영팀',date:'04.30'}},
  promotions:{title:'프로모션', cls:'simple', fields:[['title','제목'],['period','기간'],['status','상태']], blank:{title:'',period:'2026-04-30 ~ 2026-05-31',status:'진행중'}}
};
let content = {};
let current = 'rankings';

async function login(){
  const msg=document.getElementById('loginMsg');
  try{
    await PicaApi.adminLogin(document.getElementById('adminId').value.trim(),document.getElementById('adminPw').value);
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='grid';
    await boot();
  }catch(e){msg.textContent=e.message;msg.className='msg err'}
}
async function boot(){
  content = await PicaApi.getContent();
  document.getElementById('tabs').innerHTML = Object.entries(sections).map(([key,s])=>`<button class="tab ${key===current?'active':''}" onclick="openSection('${key}')">${s.title}</button>`).join('');
  render();
}
function openSection(key){current=key;boot()}
function fieldInput(item, field){
  const [key,label,type,opts]=field;
  const value = item[key] ?? '';
  if(type==='select') return `<label>${label}</label><select data-key="${key}">${opts.map(o=>`<option value="${o}" ${o===value?'selected':''}>${o}</option>`).join('')}</select>`;
  return `<label>${label}</label><input data-key="${key}" type="${type||'text'}" value="${String(value).replaceAll('"','&quot;')}">`;
}
function render(){
  const s=sections[current], list=content[current] || [];
  document.getElementById('sectionTitle').textContent=s.title;
  document.getElementById('editor').innerHTML=list.map((item,i)=>`<div class="row ${s.cls}" data-index="${i}">${s.fields.map(f=>`<div>${fieldInput(item,f)}</div>`).join('')}<button class="btn danger" onclick="removeRow(${i})">삭제</button></div>`).join('');
  document.querySelectorAll('#tabs .tab').forEach((b,i)=>b.classList.toggle('active',Object.keys(sections)[i]===current));
}
function sync(){
  const s=sections[current];
  content[current]=[...document.querySelectorAll('.row')].map(row=>{
    const item={};
    s.fields.forEach(([key,,type])=>{
      const input=row.querySelector(`[data-key="${key}"]`);
      item[key]=type==='number'?Number(input.value):input.value;
    });
    if(current==='rankings') item.icon=(item.name||'?').slice(0,2).toUpperCase();
    return item;
  });
}
function addRow(){sync();content[current].push({...sections[current].blank});render()}
function removeRow(i){sync();content[current].splice(i,1);render()}
async function save(){
  const msg=document.getElementById('msg');
  try{sync();await PicaApi.saveContent(content);msg.textContent='저장되었습니다.';msg.className='msg ok'}
  catch(e){msg.textContent=e.message;msg.className='msg err'}
}
</script>
</body>
</html>
